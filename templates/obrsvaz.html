<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь — ИнТехДом</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}?v=20260429">
    <script src="{{ url_for('static', filename='main.js') }}?v=20260429" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header class="site-header">
        <nav>
            <div class="logo">
                <a href="{{ url_for('main') }}" aria-label="На главную">
                    <span class="logo-img" aria-hidden="true">
                        <img src="{{ url_for('static', filename='img/logo/miniintexdom.png') }}" alt="ИнТехДом" />
                    </span>
                    <span class="logo-text">ИнТехДом</span>
                </a>
            </div>
            <button class="theme-toggle" aria-label="Переключить тему" title="Переключить тему">
                <span class="theme-icon" aria-hidden="true">🌗</span>
            </button>
            <div class="menu-btn" aria-label="Открыть меню" aria-expanded="false" aria-controls="primary-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul id="primary-menu" class="nav-links">
                <li><a href="{{ url_for('main') }}">Главная</a></li>
                <li><a href="#contact">Контакты</a></li>
                <li><button class="phone-copy" type="button" data-copy="+79080381299" aria-label="Скопировать телефон">+7 (908) 038-12-99</button></li>
                <li class="messenger-links nav-messengers" aria-label="Messengers">
                    <span class="messenger-icon messenger-telegram" aria-label="Telegram" title="Telegram"><i class="fab fa-telegram-plane"></i></span>
                    <span class="messenger-icon messenger-max" aria-label="MAX" title="MAX"><svg viewBox="0 0 100 100" aria-hidden="true" focusable="false"><path d="M50.76 0c27.53 0 49.12 22.34 49.12 49.89S77.61 99.23 51.02 99.23c-9.43 0-14.01-1.33-21.37-6.54-.5-.36-1.2-.26-1.63.19-5.66 6.04-20.17 10.28-20.83 2.03C7.19 80.53 0 71.18 0 49.61 0 21.3 23.22 0 50.76 0m.77 24.55c-13.07-.68-23.26 8.39-25.51 22.58-1.86 11.75 1.44 26.07 4.26 26.8 1.2.3 4.08-1.9 6.18-3.88.4-.37.99-.44 1.45-.15 3.27 2 6.97 3.5 11.05 3.71 13.42.7 25.3-9.8 26-23.21.71-13.42-10.01-25.14-23.43-25.85"/></svg></span>
                    <span class="messenger-icon messenger-whatsapp" aria-label="WhatsApp" title="WhatsApp"><i class="fab fa-whatsapp"></i></span>
                </li>
            </ul>
        </nav>
    </header>

    <section class="section">
      <div class="container">
        <div class="main-content" style="margin:0;">
            <h1>Обратная связь</h1>
        </div>
        <form id="feedback-form" class="feedback-form" novalidate>
            <div class="form-row">
                <div class="form-field">
                    <label for="name">Имя</label>
                    <input type="text" id="name" name="name" placeholder="Ваше имя" required />
                </div>
                <div class="form-field">
                    <label for="telephone">Телефон</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="+7XXXXXXXXXX" required />
                </div>
            </div>
            <div class="form-row">
                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="mail@example.com" />
                </div>
                <div class="form-field">
                    <label for="subject">Тема</label>
                    <input type="text" id="subject" name="subject" placeholder="Коротко о задаче" />
                </div>
            </div>
            <div class="form-field">
                <label for="message">Сообщение</label>
                <textarea id="message" name="message" rows="4" placeholder="Опишите задачу"></textarea>
            </div>
            <button type="submit" class="btn primary" id="feedback-submit">Отправить</button>
            <p id="feedback-status" class="form-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <div class="page-navigation">
        <a href="{{ url_for('main') }}" class="nav-button prev">
            <i class="fas fa-arrow-left"></i> На главную
        </a>
    </div>

    <footer>
        <div class="footer-content footer-grid" id="contact">
            <div class="footer-brand">
                <h4>ИнТехДом</h4>
                <p>Проектирование, монтаж и обслуживание инженерных систем для дома, коммерческих и технических объектов.</p>
                <p><i class="fas fa-paper-plane"></i><span>Если задача уже сформулирована, можно сразу оставить заявку и приложить краткое описание объекта.</span></p>
            </div>
            <div class="footer-card">
                <h4>Контакты</h4>
                <p><i class="fas fa-phone"></i><span>Телефон: <button class="phone-copy" type="button" data-copy="+79080381299" aria-label="Скопировать телефон">+7 (908) 038-12-99</button></span></p>
                <div class="messenger-links footer-messengers" aria-label="Messengers">
                    <span class="messenger-icon messenger-telegram" aria-label="Telegram" title="Telegram"><i class="fab fa-telegram-plane"></i></span>
                    <span class="messenger-icon messenger-max" aria-label="MAX" title="MAX"><svg viewBox="0 0 100 100" aria-hidden="true" focusable="false"><path d="M50.76 0c27.53 0 49.12 22.34 49.12 49.89S77.61 99.23 51.02 99.23c-9.43 0-14.01-1.33-21.37-6.54-.5-.36-1.2-.26-1.63.19-5.66 6.04-20.17 10.28-20.83 2.03C7.19 80.53 0 71.18 0 49.61 0 21.3 23.22 0 50.76 0m.77 24.55c-13.07-.68-23.26 8.39-25.51 22.58-1.86 11.75 1.44 26.07 4.26 26.8 1.2.3 4.08-1.9 6.18-3.88.4-.37.99-.44 1.45-.15 3.27 2 6.97 3.5 11.05 3.71 13.42.7 25.3-9.8 26-23.21.71-13.42-10.01-25.14-23.43-25.85"/></svg></span>
                    <span class="messenger-icon messenger-whatsapp" aria-label="WhatsApp" title="WhatsApp"><i class="fab fa-whatsapp"></i></span>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
